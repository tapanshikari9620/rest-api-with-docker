apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rest-api
  template:
    metadata:
      labels:
        app: rest-api
    spec:
      containers:
        - name: rest-api
          image: tapanaws155/rest-api-with-docker:2.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
